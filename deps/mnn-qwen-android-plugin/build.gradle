buildscript {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.2'
    }
}

apply plugin: 'com.android.library'

android {
    namespace 'com.studyquiz.mnn'
    compileSdk 33

    defaultConfig {
        minSdk 24
        targetSdk 33
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
            java.srcDirs = ['src/main/java']
            assets.srcDirs = ['src/main/assets']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
            jniDebuggable true
        }
    }
}

dependencies {
    // Compile against ABI-compatible declarations only; the uni-app host supplies them at runtime.
    compileOnly project(':dcloud-stubs')
}

tasks.register('stageReleaseAar', Copy) {
    dependsOn 'assembleRelease'
    from layout.buildDirectory.file("outputs/aar/${project.name}-release.aar")
    into layout.projectDirectory.dir('../../frontend/nativeplugins/MnnQwenPlugin/android/libs')
    rename { 'MnnQwenPlugin.aar' }
}
